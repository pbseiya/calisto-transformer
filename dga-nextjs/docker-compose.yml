services:
  dga-dashboard:
    build: .
    container_name: dga-dashboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - /home/seiya/projects/calisto-transformer/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@host.docker.internal:5432/dga_monitor
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://10.28.15.77/dga
      - DGA_USERNAME=admin
      - DGA_PASSWORD=dga2024
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/dga"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
