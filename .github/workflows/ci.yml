name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dga-nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dga-nextjs

      - name: Run lint
        run: npm run lint
        working-directory: dga-nextjs
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        working-directory: dga-nextjs

      - name: Build test
        run: npm run build
        working-directory: dga-nextjs

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dga-nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dga-nextjs

      - name: Run tests
        run: npx vitest run
        working-directory: dga-nextjs
        if: ${{ hashFiles('dga-nextjs/__tests__/**') != '' }}
        continue-on-error: true
